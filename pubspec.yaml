name: flower
description: Flower E-commerce App

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_bloc: ^9.1.1

  # Dependency Injection
  get_it: ^9.2.1
  injectable: ^3.0.0

  # Networking
  dio: ^5.9.2
  retrofit: ^4.9.2
  pretty_dio_logger: ^1.4.0

  # Serialization
  json_annotation: ^4.9.0

  # Storage
  flutter_secure_storage: ^10.0.0

  # UI Helpers
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  google_fonts: ^8.1.0

  # Localization
  easy_localization: ^3.0.8

  # Utils
  equatable: ^2.0.8
  flutter_svg: ^2.2.4


dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Testing
  test: ^1.30.0
  mockito: ^5.4.6

  # Code Generation
  build_runner: ^2.4.13
  injectable_generator: ^3.0.2
  retrofit_generator: ^10.2.5
  json_serializable: ^6.7.1


flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/svgs/
    - assets/translations/